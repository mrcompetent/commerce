{# checkout_cancel.html #}
{% extends "base.html" %}
{% block title %}Payment Cancelled{% endblock %}
{% block content %}
<section class="checkout-result">
    <div class="container">
        <h1>Payment cancelled</h1>
        <p>Your payment was not completed. You can review your cart and try again.</p>
        <a href="{% url 'cart_detail' %}" class="btn btn-dark">Return to Cart</a>
    </div>
</section>
{% endblock %}
