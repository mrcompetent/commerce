{# templates/accounts/_account_sidebar.html #}

<aside class="account-sidebar">
  <div class="account-user">
    <div class="avatar-circle">
      {{ request.user.username|slice:":2"|upper }}
    </div>
    <div>
      <p class="user-name">Hello, {{ request.user.username }}</p>
      <span class="user-meta">My account</span>
    </div>
  </div>

  <nav class="account-nav">
    <a href="{% url 'dashboard' %}" class="{% if active_tab == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="{% url 'orders' %}" class="{% if active_tab == 'orders' %}active{% endif %}">Orders</a>
    <a href="{% url 'wishlist' %}" class="{% if active_tab == 'wishlist' %}active{% endif %}">Wishlist</a>
    <a href="{% url 'addresses' %}" class="{% if active_tab == 'addresses' %}active{% endif %}">Addresses</a>
    <a href="{% url 'logout' %}">Logout</a>
  </nav>
</aside>
