{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}

<section class="auth-section">
  <div class="container auth-inner">
    <div class="auth-card">
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-meta" style="margin-bottom:14px;">
        Enter your email and we’ll send a reset link.
      </p>

      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <div class="form-field">
          <label>Email address</label>
          {{ form.email }}
          {{ form.email.errors }}
        </div>

        <button class="btn btn-dark auth-btn" type="submit">Send Reset Link</button>
      </form>

      <p class="auth-meta">
        Remembered it?
        <a href="{% url 'login' %}">Sign in</a>
      </p>
    </div>
  </div>
</section>

{% endblock %}
